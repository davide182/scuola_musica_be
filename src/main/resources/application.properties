# ==========================================
# Scuola di Musica - Configurazione Applicazione
# ==========================================

# Database H2 in memoria
spring.datasource.url=jdbc:h2:mem:scuola_musica
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.api-docs.enabled=true

# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# TODO: Impostare una chiave segreta per la firma dei token JWT.
#       La chiave deve essere lunga almeno 64 caratteri per l'algoritmo HS512.
#       Esempio: una stringa alfanumerica casuale di 80+ caratteri.
myapp.jwtSecret=CAMBIAMI_inserire_qui_una_chiave_segreta_sufficientemente_lunga_almeno_64_caratteri_1234567890

# TODO: Impostare la durata del token JWT in millisecondi.
#       Esempio: 86400000 = 24 ore, 3600000 = 1 ora
myapp.jwtExpirationMs=86400000

# Logging
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# SPRING BOOT ACTUATOR
# ==========================================

# --- Endpoint esposti via HTTP ---
# Di default, Actuator espone SOLO "health".
# Con "include=*" esponiamo TUTTI gli endpoint per dimostrazione.
# In produzione: include=health,info
management.endpoints.web.exposure.include=*

# --- /actuator/health: dettagli visibili ---
# "always"         → mostra i dettagli a tutti (dev)
# "when-authorized"→ solo utenti autenticati (prod)
# "never"          → mostra solo UP/DOWN
management.endpoint.health.show-details=always

# --- /actuator/info: abilita le info dalle properties ---
# Necessario per leggere le proprieta' info.app.* definite sotto.
management.info.env.enabled=true

# --- Informazioni applicazione (appaiono in /actuator/info) ---
info.app.name=Actuator Demo
info.app.description=Progetto dimostrativo per Spring Boot Actuator
info.app.version=1.0.0
info.app.docente=Davide

# ==========================================
# ENDPOINT ACTUATOR DISPONIBILI
# ==========================================
# Dopo l'avvio, prova questi URL nel browser o con curl:
#
# SALUTE DELL'APP:
#   http://localhost:8080/actuator/health
#   → Mostra lo stato dell'app (UP/DOWN) con i custom health indicator
#
# INFORMAZIONI:
#   http://localhost:8080/actuator/info
#   → Mostra le info.app.* + il nostro AppInfoContributor
#
# METRICHE:
#   http://localhost:8080/actuator/metrics
#   → Lista di tutte le metriche disponibili
#
#   http://localhost:8080/actuator/metrics/jvm.memory.used
#   → Memoria JVM utilizzata
#
#   http://localhost:8080/actuator/metrics/http.server.requests
#   → Statistiche sulle richieste HTTP (dopo aver fatto alcune chiamate)
#
# BEANS:
#   http://localhost:8080/actuator/beans
#   → Tutti i bean registrati nel contesto Spring
#
# ENVIRONMENT:
#   http://localhost:8080/actuator/env
#   → Tutte le proprieta' di configurazione
#
# INDICE:
#   http://localhost:8080/actuator
#   → Lista di tutti gli endpoint attivi (punto di partenza)